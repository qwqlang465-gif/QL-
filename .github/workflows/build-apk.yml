name: Build QL Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Prepare Android web assets
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -R dist/. android/app/src/main/assets/public/
          cat > android/app/src/main/assets/capacitor.config.json <<'JSON'
          {
            "appId": "com.qwqlang465.ql",
            "appName": "QL",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "ql.localhost"
            }
          }
          JSON
          echo "[]" > android/app/src/main/assets/capacitor.plugins.json
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/config.xml <<'XML'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <access origin="*" />
          </widget>
          XML

      - name: Build APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/*.apk artifacts/QL-${{ github.ref_name }}-debug.apk
          cp android/app/build/outputs/apk/release/*.apk artifacts/QL-${{ github.ref_name }}-release.apk

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QL-${{ github.ref_name }}-android-apk
          path: artifacts/*.apk
          if-no-files-found: error

  windows-exe:
    name: Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Package Windows portable exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try {
            $appOut = "release\win-unpacked"
            $resourcesApp = Join-Path $appOut "resources\app"
            $electronDist = "node_modules\electron\dist"
            $electronExe = Join-Path $electronDist "electron.exe"

            if (-not (Test-Path $electronExe)) {
              $electronVersion = node -p "require('./node_modules/electron/package.json').version"
              $downloadDir = ".cache\electron"
              $zipPath = Join-Path $downloadDir "electron-v$electronVersion-win32-x64.zip"
              $downloadUrl = "https://github.com/electron/electron/releases/download/v$electronVersion/electron-v$electronVersion-win32-x64.zip"

              New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
              New-Item -ItemType Directory -Force -Path $electronDist | Out-Null
              Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
              Expand-Archive -Path $zipPath -DestinationPath $electronDist -Force
            }

            Remove-Item -Recurse -Force $appOut -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $appOut | Out-Null
            Copy-Item -Path "$electronDist\*" -Destination $appOut -Recurse -Force

            if (Test-Path (Join-Path $appOut "electron.exe")) {
              Rename-Item -Path (Join-Path $appOut "electron.exe") -NewName "QL.exe" -Force
            }

            Remove-Item -Force (Join-Path $appOut "resources\default_app.asar") -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $resourcesApp | Out-Null
            Copy-Item -Path "dist" -Destination (Join-Path $resourcesApp "dist") -Recurse -Force
            Copy-Item -Path "electron" -Destination (Join-Path $resourcesApp "electron") -Recurse -Force
            Copy-Item -Path "package.json" -Destination (Join-Path $resourcesApp "package.json") -Force
          } catch {
            $message = $_.Exception.Message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Windows portable package failed::$message"
            throw
          }

      - name: Collect Windows exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "artifacts\QL-${{ github.ref_name }}-win-unpacked.zip" -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QL-${{ github.ref_name }}-windows-exe
          path: artifacts/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - android-apk
      - windows-exe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="CHANGELOG.md"
          shopt -s globstar nullglob

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "QL ${tag}" --notes-file "$notes_file"
          fi

          gh release upload "$tag" release-artifacts/**/*.apk release-artifacts/**/*.zip --clobber
